<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>模态框测试</title>
<style>
body { font-family: sans-serif; padding: 50px; background: #f5f5f5; }
.btn { padding: 12px 24px; background: #1D9E75; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }

.modal-mask {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 2000;
}
.modal-mask.show {
    display: flex;
    justify-content: center;
    align-items: center;
}
.modal-box {
    background: white; border-radius: 10px;
    width: 90%; max-width: 500px;
    padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.modal-box h3 { margin-top: 0; }
.modal-box button { margin-top: 15px; padding: 8px 20px; cursor: pointer; }
</style>
</head>
<body>

<p>测试：点下面按钮，看能不能弹出模态框</p>
<button class="btn" onclick="openModal()">点我弹出模态框</button>

<div class="modal-mask" id="mask">
    <div class="modal-box">
        <h3>✅ 弹窗成功了！</h3>
        <p>如果你看到这个，说明 JS 正常运行。</p>
        <button onclick="closeModal()">关闭</button>
    </div>
</div>

<script>
function openModal() {
    var m = document.getElementById('mask');
    if (!m) { alert('找不到mask元素'); return; }
    m.classList.add('show');
}
function closeModal() {
    var m = document.getElementById('mask');
    if (m) m.classList.remove('show');
}
// 点击遮罩关闭
(function(){
    var m = document.getElementById('mask');
    if (m) {
        m.addEventListener('click', function(e){
            if (e.target === this) closeModal();
        });
    }
})();
</script>
</body>
</html>
