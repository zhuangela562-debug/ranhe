<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>然合教育 - 预约管理</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei',Arial,sans-serif; background:#F5F5F5; color:#333; }
.header { background:linear-gradient(135deg,#1D9E75,#25b885); color:white; padding:0 30px; height:60px; display:flex; align-items:center; justify-content:space-between; position:fixed; top:0; left:0; right:0; z-index:100; }
.sidebar { width:250px; background:white; height:calc(100vh - 60px); position:fixed; top:60px; left:0; overflow-y:auto; }
.main-content { margin-left:250px; margin-top:60px; padding:30px; }
.page-title { font-size:24px; margin-bottom:10px; }
.toolbar { display:flex; justify-content:space-between; margin-bottom:20px; gap:15px; }
.search-box { flex:1; max-width:400px; }
.search-box input { width:100%; padding:10px 15px 10px 40px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; outline:none; }
.search-box input:focus { border-color:#1D9E75; }
.btn { padding:10px 20px; border:none; border-radius:8px; cursor:pointer; font-size:14px; font-weight:600; font-family:inherit; }
.btn-primary { background:linear-gradient(135deg,#1D9E75,#25b885); color:white; }
.filter-tabs { display:flex; gap:10px; margin-bottom:20px; border-bottom:2px solid #e0e0e0; padding-bottom:10px; }
.filter-tab { padding:8px 16px; background:none; border:none; cursor:pointer; font-size:14px; color:#666; border-bottom:2px solid transparent; font-family:inherit; }
.filter-tab.active { color:#1D9E75; border-bottom-color:#1D9E75; font-weight:600; }
.table-container { background:white; border-radius:10px; overflow:hidden; }
.table { width:100%; border-collapse:collapse; }
.table th { text-align:left; padding:15px; background:#f9f9f9; color:#666; font-weight:600; font-size:14px; border-bottom:2px solid #eee; }
.table td { padding:15px; border-bottom:1px solid #eee; font-size:14px; }
.status-badge { display:inline-block; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; }
.status-badge.pending { background:#FFF3E0; color:#FF9800; }
.status-badge.confirmed { background:#E8F5E9; color:#1D9E75; }
.action-buttons { display:flex; gap:8px; }
.action-btn { padding:5px 10px; border:none; border-radius:5px; cursor:pointer; font-size:12px; font-family:inherit; }
.action-btn.view { background:#E3F2FD; color:#2196F3; }
.action-btn.edit { background:#FFF3E0; color:#FF9800; }
.action-btn.delete { background:#FFEBEE; color:#f44336; }
.pagination { display:flex; justify-content:center; gap:10px; margin-top:20px; }
.pagination button { padding:8px 12px; border:1px solid #e0e0e0; background:white; cursor:pointer; border-radius:5px; font-family:inherit; }
.pagination button.active { background:#1D9E75; color:white; }
.modal-mask { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; }
.modal-mask.show { display:flex !important; justify-content:center; align-items:center; }
.modal-box { background:white; border-radius:10px; width:90%; max-width:600px; max-height:90vh; overflow-y:auto; }
.modal-header { padding:20px 30px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
.modal-body { padding:30px; }
.modal-footer { padding:20px 30px; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:10px; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; margin-bottom:8px; font-weight:500; font-size:14px; }
.form-group input, .form-group select, .form-group textarea { width:100%; padding:10px 15px; border:2px solid #e0e0e0; border-radius:8px; font-size:14px; outline:none; font-family:inherit; }
.form-group textarea { resize:vertical; min-height:100px; }
</style>
</head>
<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
        <img src="logo.png" style="height:36px;width:36px;border-radius:50%;object-fit:cover;">
        <span>然合教育预约系统</span>
    </div>
    <div>
        <span style="margin-right:15px;">欢迎，管理员</span>
        <button style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:8px 15px;border-radius:5px;cursor:pointer;font-family:inherit;" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="sidebar">
    <a href="dashboard.html" style="display:flex;padding:15px 25px;align-items:center;gap:12px;color:#666;text-decoration:none;">仪表板</a>
    <a href="appointments.html" style="display:flex;padding:15px 25px;align-items:center;gap:12px;color:#1D9E75;background:#f0f9f4;text-decoration:none;border-left:3px solid #1D9E75;font-weight:600;">预约管理</a>
    <a href="students.html" style="display:flex;padding:15px 25px;align-items:center;gap:12px;color:#666;text-decoration:none;">学生管理</a>
</div>

<div class="main-content">
    <h2 class="page-title">预约管理</h2>
    <p style="color:#666;margin-bottom:30px;font-size:14px;">管理所有学生的预约信息</p>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" placeholder="搜索学生姓名、课程..." id="searchInput">
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="openModal('add')">+ 新增预约</button>
        </div>
    </div>

    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterStatus('all',this)">全部</button>
        <button class="filter-tab" onclick="filterStatus('pending',this)">待确认</button>
        <button class="filter-tab" onclick="filterStatus('confirmed',this)">已确认</button>
        <button class="filter-tab" onclick="filterStatus('completed',this)">已完成</button>
    </div>

    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>预约编号</th><th>学生姓名</th><th>课程类型</th>
                    <th>教师</th><th>预约时间</th><th>来源</th>
                    <th>状态</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="apptTable">
                <tr data-status="pending">
                    <td>#AP20260606001</td><td>张三</td><td>ABA训练</td>
                    <td>李老师</td><td>2026-06-06 09:00</td><td>大众点评</td>
                    <td><span class="status-badge pending">待确认</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn view" onclick="openModal('view',1)">查看</button>
                            <button class="action-btn edit" onclick="openModal('edit',1)">编辑</button>
                            <button class="action-btn delete" onclick="deleteAppt(1)">删除</button>
                        </div>
                    </td>
                </tr>
                <tr data-status="confirmed">
                    <td>#AP20260606002</td><td>李四</td><td>NET自然情境教学</td>
                    <td>王老师</td><td>2026-06-06 10:00</td><td>残联</td>
                    <td><span class="status-badge confirmed">已确认</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn view" onclick="openModal('view',2)">查看</button>
                            <button class="action-btn edit" onclick="openModal('edit',2)">编辑</button>
                            <button class="action-btn delete" onclick="deleteAppt(2)">删除</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="pagination">
        <button onclick="changePage(-1)">上一页</button>
        <button class="active" onclick="goPage(1)">1</button>
        <button onclick="goPage(2)">2</button>
        <button onclick="changePage(1)">下一页</button>
    </div>
</div>

<div class="modal-mask" id="modalMask">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">新增预约</h3>
            <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#999;font-family:inherit;">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>学生姓名</label>
                <input type="text" id="f_student">
            </div>
            <div class="form-group">
                <label>课程类型</label>
                <select id="f_course">
                    <option value="">请选择</option>
                    <option>ABA训练</option>
                    <option>NET自然情境教学</option>
                    <option>言语治疗</option>
                </select>
            </div>
            <div class="form-group">
                <label>教师</label>
                <select id="f_teacher">
                    <option value="">请选择</option>
                    <option>李老师</option>
                    <option>王老师</option>
                </select>
            </div>
            <div class="form-group">
                <label>预约日期</label>
                <input type="date" id="f_date">
            </div>
            <div class="form-group">
                <label>预约时间</label>
                <input type="time" id="f_time">
            </div>
            <div class="form-group">
                <label>用户来源</label>
                <select id="f_source" onchange="onSourceChange()">
                    <option value="">请选择</option>
                    <option value="大众点评">大众点评</option>
                    <option value="高德">高德</option>
                    <option value="残联">残联</option>
                    <option value="抖音">抖音</option>
                    <option value="公众号">公众号</option>
                    <option value="__custom__">自定义</option>
                </select>
            </div>
            <div class="form-group" id="f_customGroup" style="display:none;">
                <label>自定义来源</label>
                <input type="text" id="f_customSource" placeholder="请输入来源名称">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="f_notes"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button onclick="closeModal()" style="padding:8px 20px;border:1px solid #e0e0e0;background:white;cursor:pointer;font-family:inherit;">取消</button>
            <button class="btn btn-primary" onclick="saveAppt()">保存</button>
        </div>
    </div>
</div>

<script>
function openModal(mode, id) {
    var m = document.getElementById("modalMask");
    if (!m) { alert("no mask"); return; }
    document.getElementById("modalTitle").textContent = (mode === "add") ? "新增预约" : "查看预约";
    m.classList.add("show");
}
function closeModal() {
    var m = document.getElementById("modalMask");
    if (m) m.classList.remove("show");
}
(function(){
    var m = document.getElementById("modalMask");
    if (m) {
        m.addEventListener("click", function(e){ if(e.target === this) closeModal(); });
    }
})();
function onSourceChange() {
    var sel = document.getElementById("f_source");
    document.getElementById("f_customGroup").style.display = (sel.value === "__custom__") ? "" : "none";
}
function saveAppt() {
    var student = document.getElementById("f_student").value.trim();
    var course = document.getElementById("f_course").value;
    var teacher = document.getElementById("f_teacher").value;
    var date = document.getElementById("f_date").value;
    var time = document.getElementById("f_time").value;
    var source = document.getElementById("f_source").value;
    var customSource = document.getElementById("f_customSource").value.trim();

    if (!student) { alert("请输入学生姓名"); return; }
    if (!course) { alert("请选择课程类型"); return; }
    if (!teacher) { alert("请选择教师"); return; }
    if (!date) { alert("请选择预约日期"); return; }
    if (!time) { alert("请选择预约时间"); return; }
    if (!source) { alert("请选择用户来源"); return; }

    var finalSource = (source === "__custom__") ? customSource : source;
    if (source === "__custom__" && !customSource) { alert("请输入自定义来源名称"); return; }

    // 生成预约编号
    var now = new Date();
    var seq = document.querySelectorAll("#apptTable tr").length + 1;
    var id = "#AP" + now.getFullYear() +
        String(now.getMonth()+1).padStart(2,"0") +
        String(now.getDate()).padStart(2,"0") +
        String(seq).padStart(3,"0");

    // 拼接时间
    var fullTime = date + " " + time;

    // 创建新行
    var row = document.createElement("tr");
    row.setAttribute("data-status", "pending");
    row.innerHTML =
        "<td>" + id + "</td>" +
        "<td>" + student + "</td>" +
        "<td>" + course + "</td>" +
        "<td>" + teacher + "</td>" +
        "<td>" + fullTime + "</td>" +
        "<td>" + finalSource + "</td>" +
        "<td><span class=\"status-badge pending\">待确认</span></td>" +
        "<td><div class=\"action-buttons\">" +
        "<button class=\"action-btn view\" onclick=\"openModal('view'," + seq + ")\">查看</button>" +
        "<button class=\"action-btn edit\" onclick=\"openModal('edit'," + seq + ")\">编辑</button>" +
        "<button class=\"action-btn delete\" onclick=\"deleteApptRow(this)\">删除</button>" +
        "</div></td>";

    document.getElementById("apptTable").appendChild(row);

    // 清空表单并关闭弹窗
    document.getElementById("f_student").value = "";
    document.getElementById("f_course").value = "";
    document.getElementById("f_teacher").value = "";
    document.getElementById("f_date").value = "";
    document.getElementById("f_time").value = "";
    document.getElementById("f_source").value = "";
    document.getElementById("f_customSource").value = "";
    document.getElementById("f_customGroup").style.display = "none";
    closeModal();
}

function deleteApptRow(btn) {
    if (confirm("确定删除这条预约？")) {
        btn.closest("tr").remove();
    }
}
function deleteAppt(id) { if(confirm("确定删除？")) alert("删除成功（演示）"); }
function logout() { if(confirm("确定退出？")) window.location.href = "login.html"; }
function filterStatus(s, btn) {
    var tabs = document.querySelectorAll(".filter-tab");
    for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove("active"); }
    if (btn) btn.classList.add("active");
    var rows = document.querySelectorAll("#apptTable tr");
    for (var i = 0; i < rows.length; i++) {
        rows[i].style.display = (s === "all" || rows[i].getAttribute("data-status") === s) ? "" : "none";
    }
}
var currentPage = 1;
function changePage(d) { currentPage = Math.max(1, currentPage + d); refreshButtons(); }
function goPage(n) { currentPage = n; refreshButtons(); }
function refreshButtons() {
    var btns = document.querySelectorAll(".pagination button");
    for (var i = 0; i < btns.length; i++) { btns[i].classList.remove("active"); }
    var target = document.querySelector(".pagination button:nth-child(" + (currentPage + 1) + ")");
    if (target) target.classList.add("active");
}
</script>
</body>
</html>
